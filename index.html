<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="name">
        <h2>Your Calculator</h2>
      </div>

      <input type="text" id="display" value="0" readonly /><br /><br />
      <input type="number" id="inputNumber" required />
      <p>Mời bạn nhập số và thực hiện phép tính</p>
      <button id="add">Add +</button>
      <button id="sub">Subtract -</button>
      <button id="mul">Multiply *</button>
      <button id="div">Divide /</button><br />
      <button id="equal">Equal</button>
      <button id="out">Thoát</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
